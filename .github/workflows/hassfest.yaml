name: Validate with hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - uses: home-assistant/actions/hassfest@master
